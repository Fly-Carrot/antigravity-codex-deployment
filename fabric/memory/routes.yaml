version: 1
routes:
  stable_technical_route:
    type: "skill"
    handler: "user-configured-continuous-learning"
    source_path: "${AGF_IMPLEMENTATION_ROOT}/skills/continuous-learning"
    capture_examples:
      - "successful environment recipe"
      - "reusable architecture decision"
      - "stable implementation pattern"
      - "cross-session engineering instinct"
    bridge_outputs:
      - "${AGF_GLOBAL_ROOT}/memory/ki-registry.yaml"
      - "${AGF_GLOBAL_ROOT}/memory/decision-log.ndjson"
  episodic_detail:
    type: "mcp"
    handler: "mempalace"
    source_path: "${AGF_GLOBAL_ROOT}/mcp/servers.yaml#mempalace"
    capture_examples:
      - "debugging trace"
      - "reasoning trail summary"
      - "parameter exploration"
      - "failed branch with future retrieval value"
    bridge_outputs:
      - "${AGF_GLOBAL_ROOT}/memory/mempalace-taxonomy.yaml"
      - "${AGF_GLOBAL_ROOT}/memory/handoffs.ndjson"
      - "${AGF_GLOBAL_ROOT}/memory/open-loops.ndjson"
